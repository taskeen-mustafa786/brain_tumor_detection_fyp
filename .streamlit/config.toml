[theme]
primaryColor = "#2E86AB"
backgroundColor = "#1a1a1a"
secondaryBackgroundColor = "#2d2d2d"
textColor = "#ffffff"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "viewer"

[logger]
level = "info"

[server]
port = 8501
headless = true
runOnSave = false
maxUploadSize = 50  # MB - limit for MRI scans
maxMessageSize = 100  # MB
enableCORS = false
enableXsrfProtection = true

[global]
developmentMode = false
dataFrameSerialization = "legacy"
